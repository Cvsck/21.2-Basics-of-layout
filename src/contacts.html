<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Контакты</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container-fluid">
        <!-- 🔹 Боковое меню -->
        <nav class="sidebar">
            <div>
                <div class="sidebar-header">
                    <div class="logo">B</div>
                    <h4>Меню</h4>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="catalog.html">Категории</a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html">Заказы</a></li>
                    <li class="nav-item"><a class="nav-link" href="contacts.html">Контакты</a></li>
                </ul>
            </div>

            <!-- 🔹 Профиль и Выход -->
            <div class="profile-section">
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="profile.html">Профиль</a></li>
                    <li class="nav-item"><a class="nav-link" href="logout.html">Выход</a></li>
                </ul>

                <!-- 🔹 Кнопка "Пользователь" с выпадающим списком -->
                <div class="dropdown">
                    <button class="btn btn-secondary dropdown-toggle" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <img src="icons/user.svg" alt="Пользователь" class="user-icon"> Пользователь
                    </button>
                    <ul class="dropdown-menu" aria-labelledby="userDropdown">
                        <li><a class="dropdown-item" href="settings.html">Настройки</a></li>
                        <li><a class="dropdown-item" href="help.html">Помощь</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 🔹 Основной контент -->
        <main class="main-content">
            <h1>Свяжитесь с нами</h1>

            <div class="container">
                <div class="row g-5">
                    <!-- 🔹 Левая часть: Форма контактов -->
                    <div class="col-md-6">
                        <form>
                            <div class="mb-3">
                                <label for="name" class="form-label">Имя</label>
                                <input type="text" class="form-control" id="name" placeholder="Введите ваше имя">
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Почта</label>
                                <input type="email" class="form-control" id="email" placeholder="Введите вашу почту">
                            </div>
                            <div class="mb-3">
                                <label for="message" class="form-label">Сообщение</label>
                                <textarea class="form-control" id="message" rows="4" placeholder="Введите ваше сообщение"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Отправить</button>
                        </form>
                    </div>

                    <!-- 🔹 Правая часть: Контактная информация -->
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">Наши контакты</h5>
                                <p class="card-text">
                                    <strong>Адрес:</strong> ул. Ракетная, 12, Симферополь, Россия<br>
                                    <strong>Email:</strong> info@yandex.ru<br>
                                    <strong>Телефон:</strong> +7 4652 123-45-67<br>
                                    <strong>Часы работы:</strong> Пн-Пт: 9:00 - 18:00
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 🔹 Подключение Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
